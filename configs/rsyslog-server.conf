# Central Server - Rsyslog Config
# Receive logs from all 50 servers

# Enable UDP log receiving on port 514
module(load="imudp")
input(type="imudp" port="514")

# Enable TCP log receiving on port 514
module(load="imtcp")
input(type="imtcp" port="514")

# Save logs from each server separately
$template RemoteLogs,"/var/log/remote/%HOSTNAME%/%PROGRAMNAME%.log"
*.* ?RemoteLogs
